name: Release

# Build the Windows exe and attach it to the GitHub Release whenever a
# version tag (e.g. v1.5.0) is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Rust stable (MSVC)
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Test
        run: cargo test --locked

      - name: Build release
        run: cargo build --release --locked

      - name: Package zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Copy-Item target/release/chatmix.exe dist/chatmix.exe -Force
          $zip = "ChatMix-$tag-win64.zip"
          Compress-Archive -Path dist/chatmix.exe, dist/README.txt -DestinationPath $zip -Force
          "ZIP=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          # Create the release with auto-generated notes; if it already exists,
          # just (re)upload the asset.
          gh release create "$tag" "$env:ZIP" --title "ChatMix $tag" --generate-notes
          if ($LASTEXITCODE -ne 0) {
            gh release upload "$tag" "$env:ZIP" --clobber
          }
