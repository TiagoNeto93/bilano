name: CI

# Build, test, and lint on every push to main and on pull requests, so
# regressions are caught before a release tag is ever cut.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Ensure Rust stable + clippy
        run: rustup toolchain install stable --profile minimal --no-self-update --component clippy

      - name: Build
        run: cargo build --locked

      - name: Test
        run: cargo test --locked

      - name: Clippy (advisory)
        run: cargo clippy --all-targets
